apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-k8s-app
  namespace: default
  labels:
    app: jenkins-k8s-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jenkins-k8s-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: jenkins-k8s-app
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: jenkins-k8s-app
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000
          env:
            - name: APP_ENV
              value: "production"
            - name: BUILD_NUMBER
              value: "BUILD_PLACEHOLDER"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
